# encore script package — example bindings.
#
# Copy these into your own input.conf (merge with what you have). Every line is
# a normal mpv binding; the trailing "#menu:" comment also places the command in
# the right-click context menu (encore-menu). Edit freely.

# ---------------------------------------------------------------------------
# Menus
# ---------------------------------------------------------------------------
MBTN_RIGHT script-binding encore_menu/menu
c          script-binding encore_settings/open                 #menu: Settings
i          script-binding encore_info/menu                     #menu: Info
?          script-binding encore_edit/menu                     #menu: Edit Config File

# ---------------------------------------------------------------------------
# File
# ---------------------------------------------------------------------------
o          script-binding encore_files/open-files              #menu: File > Open Files
Ctrl+v     script-binding encore_files/open-clipboard          #menu: File > Open Clipboard
Alt+s      script-binding encore_files/load-sub                #menu: File > Load Subtitle
Alt+a      script-binding encore_files/load-audio              #menu: File > Load Audio
Ctrl+r     script-binding encore_playback/recent               #menu: File > Recent Files
Ctrl+d     script-binding encore_files/open-dvd                #menu: File > Optical > DVD
Ctrl+b     script-binding encore_files/open-bluray             #menu: File > Optical > Blu-ray

# ---------------------------------------------------------------------------
# Navigation / selection — these are built into vanilla mpv (select.lua),
# the features mpv.net used to provide and has since deprecated.
# ---------------------------------------------------------------------------
Ctrl+p     script-binding select/select-playlist               #menu: Navigate > Playlist
F8         script-binding select/select-playlist
Ctrl+a     script-binding select/select-aid                    #menu: Navigate > Audio Track
Ctrl+s     script-binding select/select-sid                    #menu: Navigate > Subtitle Track
Ctrl+Shift+a script-binding select/select-audio-device         #menu: Navigate > Audio Device
F1         script-binding select/select-binding                #menu: Navigate > Command Palette
p          script-binding select/show-properties               #menu: Navigate > Properties

# ---------------------------------------------------------------------------
# Quit
# ---------------------------------------------------------------------------
q          quit                                                 #menu: Quit
